name: Build AWS Golden Image

# ---------------------------------------------------------------------------
# Triggers:
#   1. Manual dispatch (workflow_dispatch)
#   2. Push to main that touches packer/aws.pkr.hcl or any provisioner script
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region"
        default: "us-east-1"
        required: true

  push:
    branches: [main]
    paths:
      - "packer/aws.pkr.hcl"
      - "packer/variables.pkrvars.hcl.example"
      - "scripts/**"
      - ".github/workflows/build-aws.yml"

# Required for OIDC authentication to AWS (preferred over static keys)
permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build AWS AMI
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ inputs.aws_region || 'us-east-1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "1.10.0"

      # Authenticate to AWS using OIDC.
      # Configure the role's trust policy to allow this repo:
      #   "token.actions.githubusercontent.com:sub": "repo:<owner>/<repo>:ref:refs/heads/main"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: packer init
        working-directory: packer
        run: packer init aws.pkr.hcl

      - name: packer validate
        working-directory: packer
        run: packer validate -var "aws_region=${{ env.AWS_REGION }}" aws.pkr.hcl

      - name: packer build
        working-directory: packer
        run: |
          packer build \
            -var "aws_region=${{ env.AWS_REGION }}" \
            aws.pkr.hcl

      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-manifest
          path: packer/manifest-aws.json
